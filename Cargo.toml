[package]
name = "sqlite-graphrag"
version = "1.0.42"
edition = "2021"
rust-version = "1.88"
description = "Local GraphRAG memory for LLMs in a single SQLite file"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/daniloaguiarbr/sqlite-graphrag"
homepage = "https://docs.rs/sqlite-graphrag"
documentation = "https://docs.rs/sqlite-graphrag"
readme = "README.md"
keywords = ["graphrag", "sqlite", "llm", "embeddings", "memory"]
categories = ["command-line-utilities", "database"]
default-run = "sqlite-graphrag"
exclude = [
    ".serena/",
    ".claude/",
    ".vscode/",
    ".idea/",
    "logs/",
    "memory/",
    "docs_rules/",
    "docs/CLAUDE.md",
    "docs/CLAUDE.pt-BR.md",
    "docs/AGENT_PROTOCOL.md",
    "docs/AGENT_PROTOCOL.pt-BR.md",
    "CLAUDE.md",
    "AGENTS.md",
    "MEMORY.md",
    "ralph-loop.local.md",
    "*.profraw",
    "*.profdata",
    "*.log",
    "graphrag.sqlite",
    "graphrag.sqlite-shm",
    "graphrag.sqlite-wal",
    "*.sqlite",
    "*.sqlite-shm",
    "*.sqlite-wal",
]

[[bin]]
name = "sqlite-graphrag"
path = "src/main.rs"

[[bench]]
name = "cli_benchmarks"
harness = false

[[bench]]
name = "regression_baseline"
harness = false

[[test]]
name = "loom_lock_slots"
path = "tests/loom_lock_slots.rs"

[dependencies]
# rusqlite pinned at 0.37; upgrade to 0.39 deferred — refinery 0.9.1 (currently
# published) constrains rusqlite to ">=0.23, <=0.38" (refinery_core/Cargo.toml at
# v0.9.1). Native SQLite linking forbids two rusqlite versions in the graph
# (see https://stackoverflow.com/questions/69403524). Reassess when a refinery
# release supporting rusqlite 0.39 ships; tracked for v1.0.41.
rusqlite = { version = "0.37", features = ["bundled", "blob", "load_extension", "functions", "trace"] }
sqlite-vec = "0.1.9"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
clap = { version = "4.6", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
refinery = { version = "0.9", features = ["rusqlite"] }
anyhow = "1"
thiserror = "2"
blake3 = "1"
directories = "5"
fs4 = { version = "0.9", features = ["sync"] }
interprocess = "2"
regex = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "io-util", "macros"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
chrono-tz = "0.10"
sysinfo = { version = "0.32", default-features = false, features = ["system"] }
ctrlc = { version = "3.4", features = ["termination"] }
# Pin preventivo — constant_time_eq 0.4.3 bumped MSRV para 1.95.0 em versão patch.
# Entra como dep transitiva de blake3 (range ^0.4). Sem este pin, `cargo install`
# sem --locked resolve 0.4.3 e quebra a instalação em toolchains 1.88..1.94.
# Reavaliar quando CI passar em 1.95 e `rust-version` avançar para 1.95.
constant_time_eq = "=0.4.2"
rayon = "1.10"
text-splitter = { version = "0.30.1", features = ["markdown", "tokenizers"] }
huggingface-hub = { package = "hf-hub", version = "0.4", default-features = false, features = ["ureq"] }
candle-core = { version = "0.10.2", default-features = false }
candle-nn = { version = "0.10.2", default-features = false }
candle-transformers = { version = "0.10.2", default-features = false }
unicode-normalization = "0.1.25"

# ort pinned at =2.0.0-rc.11; upgrade to rc.12 deferred to v1.0.43 because rc.12
# brings module reshuffles (`ort::tensor` -> `ort::value`, `execution_providers`
# -> `ep`, IoBinding moved) that require coordinated changes to `src/embedder.rs`.
# fastembed 5.13.4 already pins ort=2.0.0-rc.12 upstream, so a coordinated
# fastembed + ort + embedder.rs bump is required (out of scope for v1.0.42).
# Note: rc.12 also lacks a musl prebuilt (verified 2026-05-03 via
# https://github.com/pykeio/ort/blob/v2.0.0-rc.12/ort-sys/build/download/dist.txt),
# so the musl release target was dropped in v1.0.42 (HIGH 1).
[target.'cfg(not(all(target_arch = "aarch64", target_os = "linux", target_env = "gnu")))'.dependencies]
fastembed = { version = "5", default-features = false, features = ["hf-hub-rustls-tls", "ort-download-binaries-rustls-tls", "image-models"] }
ort = { version = "=2.0.0-rc.11", default-features = false, features = ["std", "ndarray", "tracing", "download-binaries", "tls-rustls", "copy-dylibs"] }

# Same defer rationale as above (ort rc.11 -> rc.12 deferred to v1.0.43).
[target.'cfg(all(target_arch = "aarch64", target_os = "linux", target_env = "gnu"))'.dependencies]
fastembed = { version = "5", default-features = false, features = ["hf-hub-rustls-tls", "ort-load-dynamic", "image-models"] }
ort = { version = "=2.0.0-rc.11", default-features = false, features = ["std", "ndarray", "tracing", "load-dynamic"] }

[dev-dependencies]
assert_cmd = "2"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = { version = "1", features = ["std"] }
tempfile = "3"
predicates = "3"
serde_json = "1"
serial_test = "3"
mockall = "0.13"
wiremock = "0.6"
libc = "0.2"
jsonschema = "0.29"
[target.'cfg(sqlite_graphrag_loom)'.dev-dependencies]
# Só compila quando RUSTFLAGS="--cfg sqlite_graphrag_loom" é passado — previne livelock térmico.
# Incidente 2026-04-19: loom ativado sem gate saturou i9-14900KF em Tjmax 100°C.
loom = "0.7"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = 3

[features]
# Opt-in para testes pesados futuros (stress/property exaustivo).
slow-tests = []

[profile.dev]
opt-level = 1

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(sqlite_graphrag_loom)'] }
