name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # v1.0.69: opt into Node.js 24 runtime ahead of the 2026-06-16 default
  # migration. Runner warning spam is also a confirmed bug
  # (actions/runner#4295), so we additionally pin every JavaScript action
  # to a major version that targets Node 24 (checkout@v5, cache@v5, etc.).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }} / ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        # RC-13 (v1.0.98): windows-2025 removed — the test/clippy suite uses
        # Unix-only APIs (std::os::unix, PermissionsExt) in 8 files and never
        # compiled on windows. Windows production binaries are validated by
        # release.yml (native build) + the G29 cross-check (type regressions).
        os: [ubuntu-latest, macos-latest]
        # v1.0.79: embedding-legacy removed from the matrix together with
        # the feature itself; every build is LLM-only.
        features: [default, llm-only]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      # G53-WINDOWS-INFRA (v1.0.80): pre-warm rustup toolchain on
      # windows-2025 to absorb transient rustup CDN flakes before the
      # dtolnay action tries to install the same toolchain. Step is gated
      # to windows-2025; Ubuntu and macOS hosts use the bare dtolnay step.
      - name: Pre-warm rustup toolchain (windows-2025 resilience)
        if: matrix.os == 'windows-2025'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "=== Pre-warm attempt $attempt ==="
            rustup toolchain install stable --profile minimal --no-self-update
            rc=$?
            if [ $rc -eq 0 ]; then break; fi
            if [ "$attempt" -eq 3 ]; then exit $rc; fi
            sleep 15
          done
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # G53-WINDOWS-INFRA (v1.0.80): verify rustc/cargo reachable after
      # dtolnay install on windows-2025. Retries up to 3x with 10s sleep
      # to recover from PATH propagation delays on Windows runners.
      - name: Verify rustc + cargo (windows-2025 resilience)
        if: matrix.os == 'windows-2025'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "=== Verify attempt $attempt ==="
            rustc --version
            cargo --version
            rc=$?
            if [ $rc -eq 0 ]; then break; fi
            if [ "$attempt" -eq 3 ]; then exit $rc; fi
            sleep 10
          done
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Clippy with feature matrix
        # RC-3 (v1.0.98): this `run:` uses bash `if [ … ]; then … fi`, but without
        # an explicit shell windows-2025 runs it under PowerShell, which rejects
        # the bash syntax with a ParserError (exit 1) before clippy starts.
        shell: bash
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo clippy --all-targets -- -D warnings
          else
            cargo clippy --all-targets --features "${{ matrix.features }}" -- -D warnings
          fi

  test:
    name: Tests (${{ matrix.os }} / ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        # RC-13 (v1.0.98): windows-2025 removed — the test suite is Unix-only
        # (std::os::unix / PermissionsExt in 8 files) and never compiled on
        # windows. Windows binaries are validated by release.yml + the G29
        # cross-check.
        os: [ubuntu-latest, macos-latest]
        # v1.0.79: embedding-legacy removed from the matrix together with
        # the feature itself; every build is LLM-only.
        features: [default, llm-only]
        include:
          # llm-only is the v1.0.76 default build; it is the canonical
          # feature set for the release artifact.
          - features: default
            llm-cli: claude
          - features: llm-only
            llm-cli: claude
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      # G53-WINDOWS-INFRA (v1.0.80): pre-warm rustup toolchain on
      # windows-2025 to absorb transient rustup CDN flakes before the
      # dtolnay action tries to install the same toolchain. Step is gated
      # to windows-2025; Ubuntu and macOS hosts use the bare dtolnay step.
      - name: Pre-warm rustup toolchain (windows-2025 resilience)
        if: matrix.os == 'windows-2025'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "=== Pre-warm attempt $attempt ==="
            rustup toolchain install stable --profile minimal --no-self-update
            rc=$?
            if [ $rc -eq 0 ]; then break; fi
            if [ "$attempt" -eq 3 ]; then exit $rc; fi
            sleep 15
          done
      - uses: dtolnay/rust-toolchain@stable
      # G53-WINDOWS-INFRA (v1.0.80): verify rustc/cargo reachable after
      # dtolnay install on windows-2025. Retries up to 3x with 10s sleep
      # to recover from PATH propagation delays on Windows runners.
      - name: Verify rustc + cargo (windows-2025 resilience)
        if: matrix.os == 'windows-2025'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "=== Verify attempt $attempt ==="
            rustc --version
            cargo --version
            rc=$?
            if [ $rc -eq 0 ]; then break; fi
            if [ "$attempt" -eq 3 ]; then exit $rc; fi
            sleep 10
          done
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install LLM CLI mock (default + llm-only only)
        if: matrix.llm-cli == 'claude'
        shell: bash
        run: |
          # G50: reuse the canonical mocks from tests/mock-llm (64-dim,
          # single AND batch response shapes since G42/S2 + G43). The old
          # inline stub here returned 384-dim single-shape responses and
          # silently diverged from the dimensionality shipped in v1.0.79.
          mkdir -p /tmp/sgr-llm-mock/bin
          cp tests/mock-llm/claude tests/mock-llm/codex /tmp/sgr-llm-mock/bin/
          chmod +x /tmp/sgr-llm-mock/bin/claude /tmp/sgr-llm-mock/bin/codex
          echo "/tmp/sgr-llm-mock/bin" >> $GITHUB_PATH
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --version 0.9.114 --locked
      - name: Run tests with nextest (retry on network flake)
        shell: bash
        env:
          RUST_TEST_THREADS: "2"
          RUSTFLAGS: -D warnings
        run: |
          for attempt in 1 2 3; do
            echo "=== Test attempt $attempt (features=${{ matrix.features }}) ==="
            if [ "${{ matrix.features }}" = "default" ]; then
              cargo nextest run --profile ci
            else
              cargo nextest run --profile ci --features "${{ matrix.features }}"
            fi
            rc=$?
            if [ $rc -eq 0 ]; then break; fi
            if [ "$attempt" -eq 3 ]; then exit $rc; fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
      - name: Run doctests
        env:
          RUST_TEST_THREADS: "2"
          RUSTFLAGS: -D warnings
        run: cargo test --doc --all-features

  slow-contracts:
    name: Slow Contract Suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Cache embedding ONNX models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/sqlite-graphrag/models
            ~/Library/Caches/sqlite-graphrag/models
            ~\AppData\Local\sqlite-graphrag\cache\models
          key: embedding-model-multilingual-e5-small-${{ runner.os }}-v2
      - name: Run slow JSON contract suite
        env:
          RUST_TEST_THREADS: "1"
        run: timeout 5400 cargo test --features slow-tests --test doc_contract_integration -- --nocapture
      - name: Run slow PRD compliance suite
        env:
          RUST_TEST_THREADS: "1"
        run: timeout 5400 cargo test --features slow-tests --test prd_compliance -- --nocapture

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo check --all-features

  # G29 (v1.0.68): cross-compile check to catch HANDLE-type regressions on
  # Windows before publish.  Host arch on the runner is x86_64, so x86_64-pc-
  # windows-msvc catches the type check without needing the full Windows
  # linker (lib.exe) installed.
  windows-build-check:
    name: Windows MSVC cross-compile (G29)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          # v1.0.74: pass the Windows MSVC target via the toolchain
          # action AND install it explicitly. The toolchain action
          # internally runs `rustup toolchain install stable
          # --target x86_64-pc-windows-msvc --profile minimal`, but
          # `--profile minimal` ignores `--target`, so the cross
          # stdlib is never downloaded and `cargo check
          # --target x86_64-pc-windows-msvc` fails with
          # `error[E0463]: can't find crate for 'core'`.
          targets: x86_64-pc-windows-msvc
      - name: Install Windows MSVC target stdlib explicitly
        # RC-8 (v1.0.98): `rust-toolchain.toml` pins `channel = "1.88"`, so every
        # `cargo` command in the repo uses 1.88 via the override — NOT the
        # `stable` the dtolnay action installs. Adding the target to `stable`
        # (the old `--toolchain stable`) left 1.88 without the cross stdlib, so
        # `cargo check --target x86_64-pc-windows-msvc` failed with
        # `error[E0463]: can't find crate for 'core'` (exit 101). Drop the
        # explicit toolchain so the target lands on the active (overridden) 1.88.
        run: rustup target add x86_64-pc-windows-msvc
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      # RC-8 (v1.0.98): `ring` (pulled by reqwest+rustls for the OpenRouter REST
      # client) requires the MSVC compiler for the *-windows-msvc target and
      # rejects GNU, so a plain `cargo check --target x86_64-pc-windows-msvc`
      # cannot run ring's build script on a Linux runner. cargo-xwin supplies an
      # LLVM-based MSVC sysroot (clang / llvm-lib + the Windows SDK fetched by
      # xwin), letting the cross type-check run without a native Windows toolchain.
      - name: Install Clang 19 for cargo-xwin
        # RC-15 (v1.0.98): the MSVC CRT headers fetched by xwin now emit
        # STL1000 (static_assert) unless the compiler is Clang 19.0.0+.
        # ubuntu-latest ships Clang 18 via the default `clang` package, so the
        # cross type-check failed (`expected Clang 19.0.0 or newer`). Install
        # Clang 19 from apt.llvm.org and front the PATH with the unsuffixed
        # /usr/lib/llvm-19/bin so cargo-xwin picks clang-cl/lld-link/llvm-lib 19.
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19
          sudo apt-get install -y llvm-19 lld-19 clang-tools-19
          echo "/usr/lib/llvm-19/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-19/bin/clang --version
      - name: Install cargo-xwin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin
      - name: cargo xwin check --target x86_64-pc-windows-msvc
        # RC-8 (v1.0.98): the cold cross-compile downloads the MSVC SDK and
        # builds ~400 deps for the windows-msvc target from scratch, which
        # exceeded the old 900s budget on the runner (exit 124). 1800s covers
        # the cold run; Swatinem/rust-cache makes subsequent runs fast.
        run: timeout 1800 cargo xwin check --target x86_64-pc-windows-msvc --lib --all-features

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo install cargo-deny --locked
      - run: cargo deny check advisories licenses bans sources

  # G53 (v1.0.80): semantic-version compatibility check for the published
  # lib API. Gate is INFORMATIONAL in v1.0.80 (continues on error) so
  # existing PRs are not blocked before the 9 current MAJOR violations
  # are resolved; promoted to BLOCKING in v1.0.81 once the policy from
  # adr-0032 is enforced.
  semver-checks:
    name: SemVer Compatibility (G53)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-semver-checks
        # RC-5 (v1.0.98): pin to 0.44.0 via prebuilt binary. The unpinned
        # `cargo install cargo-semver-checks --locked` pulled 0.48.0, which
        # requires rustc 1.91 > our MSRV 1.88 and failed to compile (exit 101).
        # 0.44.0 is the last release supporting 1.88; the prebuilt binary skips
        # the MSRV compile entirely.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks@0.44.0
      - name: Run semver-checks against the previous release
        # v1.0.79 is the last published release; bump on each release.
        # Use --major-version to scope to a single major track; without it
        # the tool defaults to the highest published version which may not
        # be the one this branch is targeting.
        run: |
          cargo semver-checks check-release \
            --manifest-path Cargo.toml \
            --baseline-version 1.0.96 \
            --verbose || echo "::warning::semver-checks reported differences (informational, see adr-0032)"
          # The previous command exit code is non-zero when ANY breaking
          # change is detected. We currently run with continue-on-error at
          # the job level so the gate is INFORMATIONAL until G53/adr-0032
          # declares an explicit policy.
          echo "::notice::semver-checks is informational in v1.0.80; see adr-0032"

  geiger:
    name: Unsafe Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked || true
      - name: Audit unsafe density
        run: |
          cargo geiger --all-features --output-format ascii 2>&1 | tee geiger-report.txt || true
          echo "::notice::Unsafe audit report generated"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-nextest and llvm-cov
        run: |
          cargo install cargo-nextest --version 0.9.114 --locked
          cargo install cargo-llvm-cov --locked
      - name: Install mock LLM on PATH
        run: |
          mkdir -p /tmp/sgr-llm-mock/bin
          cp tests/mock-llm/claude tests/mock-llm/codex /tmp/sgr-llm-mock/bin/
          chmod +x /tmp/sgr-llm-mock/bin/claude /tmp/sgr-llm-mock/bin/codex
          echo "/tmp/sgr-llm-mock/bin" >> $GITHUB_PATH
      - name: Coverage with nextest
        env:
          RUST_TEST_THREADS: "2"
        run: cargo llvm-cov nextest --profile heavy --features slow-tests --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-lcov
          path: lcov.info

  commit-check:
    name: Block Agent Co-Authorship
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check commit messages for agent co-authors
        run: |
          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          pattern='(?i)Co-authored-by:.*(Claude|Opus|Sonnet|Haiku|GPT-|Copilot|Cursor|Gemini|Anthropic|OpenAI|dependabot\[bot\]|renovate\[bot\])'
          if git log --format='%B' "$range" | grep -Pq "$pattern"; then
            echo "::error::Commit messages must not include Co-authored-by from AI agents or bots"
            git log --format='%B' "$range" | grep -P "$pattern" || true
            exit 1
          fi
          echo "No forbidden co-authors detected"

  cargo-audit:
    name: Cargo audit (vulnerabilities + unmaintained advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # v1.0.37 (H9): cargo audit complements cargo deny check by surfacing
        # RUSTSEC advisories on transitive deps. The previous CI ran only
        # `cargo deny check`, which missed `RUSTSEC-2025-0119` (number_prefix
        # unmaintained) and `RUSTSEC-2024-0436` (paste unmaintained), both
        # transitive via fastembed/tokenizers. We ignore those two specific
        # advisories until the upstream crates publish maintained replacements;
        # all OTHER advisories (especially HIGH/CRITICAL vulnerabilities) still
        # fail the build. Re-evaluate ignores quarterly.
        run: |
          timeout 120 cargo audit \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436 \
            --deny warnings

  language-check:
    name: Language policy (English-only outside i18n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Forbid Portuguese in /// doc comments
        run: |
          if rg '///.*[áéíóúâêôãõçÁÉÍÓÚÂÊÔÃÕÇ]' src/ tests/; then
            echo "::error::Portuguese characters found in /// doc comments. Policy: English-only outside i18n.rs."
            exit 1
          fi
      - name: Forbid Portuguese in //! crate-level docs
        run: |
          if rg '//!.*[áéíóúâêôãõçÁÉÍÓÚÂÊÔÃÕÇ]' src/ tests/; then
            echo "::error::Portuguese characters found in //! crate-level docs."
            exit 1
          fi
      - name: Forbid Portuguese in tracing logs
        run: |
          if rg 'tracing::(info|warn|error|debug|trace)!.*[áéíóúâêôãõçÁÉÍÓÚÂÊÔÃÕÇ]' src/; then
            echo "::error::Portuguese in tracing logs. Use English keys/messages."
            exit 1
          fi
      - name: Forbid Portuguese in #[error(...)] attributes
        run: |
          if rg '#\[error.*[áéíóúâêôãõçÁÉÍÓÚÂÊÔÃÕÇ]' src/; then
            echo "::error::Portuguese in thiserror attributes. Use English."
            exit 1
          fi
      - name: Forbid Portuguese-without-accent words in tracing/error/doc/assert/expect/panic
        # v1.0.36 (M1): the accent-only audit gates above missed several PT
        # strings such as `tracing::warn!("NER falhou, usando apenas regex")`,
        # `"batch NER falhou (chunk de N janelas)..."`, and `"falha ao persistir
        # url '...'"`. This gate complements the accent gate by scanning the
        # specific surfaces where PT/EN drift hurts most: log lines, error
        # attributes, doc comments, and runtime assertions.
        # Plain string literals are NOT scanned because intentional fixtures
        # (PT test inputs that exercise multilingual extraction) live there.
        run: |
          # v1.0.42 (HIGH 3): extended PT_PATTERN to detect non-accented prepositions,
          # adjectives, and nouns that escaped the previous verb-focused regex.
          # Previously, "Alias de X para contrato documentado" passed the gate.
          PT_PATTERN='\b(falhou|falha|falham|falhar|falhas|janelas?|invalido|invalida|invalidos|invalidas|inicializando|inicializar|inicializa|inicializou|persistir|persistencia|persistido|persistida|configuracao|autenticacao|validacao|verificacao|compactacao|substituicao|usando apenas|nao foi|nao pode|nao tem|nao deve|nao precisa|nao consegue|nao possui|nao encontrou|nao existe|nao sera|ja foi|ja existe|ja tem|ja esta|esperado|requerido|obrigatorio|obrigatoria|obrigatorios|obrigatorias|memoria|memorias|criando|criada|criadas|criados|criou|atualizado|atualizada|atualizados|atualizadas|deletado|deletada|deletados|deletadas|inserido|inserida|inseridos|inseridas|removido|removida|removidos|removidas|busca|propaga|retorna|alias de|contrato documentado|migrado de|liberar|fonte do match|adicionado em v|quando omitido|usuarios?|para list|para related|para history|para graph|para batch|para DbBusy|para parsers|para parsers ISO|paralelo a)\b'
          # 1. Tracing macros
          if rg --no-messages -i "tracing::(info|warn|error|debug|trace)!.*${PT_PATTERN}" src/ -g '!i18n.rs'; then
            echo "::error::PT-no-accent word detected in tracing log (src/). Translate or move to i18n.rs."
            exit 1
          fi
          # 2. thiserror attributes
          if rg --no-messages -i "#\[error.*${PT_PATTERN}" src/ -g '!i18n.rs'; then
            echo "::error::PT-no-accent word detected in #[error(...)] (src/). Translate or move to i18n.rs."
            exit 1
          fi
          # 3. /// and //! doc comments
          if rg --no-messages -i "(///|//!).*${PT_PATTERN}" src/ tests/ -g '!i18n.rs'; then
            echo "::error::PT-no-accent word detected in doc comment. Translate to English."
            exit 1
          fi
          # 4. assert/panic/unreachable/bail/ensure/expect macros and methods
          if rg --no-messages -i "(panic|assert|assert_eq|assert_ne|unreachable|todo|unimplemented|bail|ensure|expect)!?\([^)]*${PT_PATTERN}" src/ tests/ -g '!i18n.rs'; then
            echo "::error::PT-no-accent word detected in panic/assert/expect (src/ or tests/). Translate to English."
            exit 1
          fi

  loom:
    name: Loom Concurrency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Run loom tests
        env:
          RUSTFLAGS: "--cfg sqlite_graphrag_loom"
          LOOM_MAX_PREEMPTIONS: "1"
          LOOM_MAX_BRANCHES: "100"
          RUST_TEST_THREADS: "1"
        run: timeout 600 cargo test --test loom_lock_slots --release -- --test-threads=1

  miri:
    name: Miri Unsafe Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Run miri on pure-Rust unsafe tests
        # v1.0.74: pass `--cfg sqlite_graphrag_miri` to gate out the
        # mimalloc global allocator (see `src/main.rs`). mimalloc's
        # `mi_malloc_aligned` is a foreign function that Miri cannot
        # model. The Miri step now uses the default Linux allocator.
        env:
          RUSTFLAGS: "--cfg sqlite_graphrag_miri"
        run: |
          cargo +nightly miri test -- \
            f32_to_bytes \
            controlled_batch_plan

  bench-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Download baseline artifact
        uses: actions/download-artifact@v5
        with:
          name: bench-baseline
          path: target/criterion
        continue-on-error: true
      - name: Install LLM CLI mock (bench needs init + remember)
        shell: bash
        run: |
          # G50: the benchmark spawns the real CLI (init/remember), which
          # requires an LLM CLI on PATH since v1.0.76. Without the mock the
          # bench dies with exit 11 (embedding failure).
          mkdir -p /tmp/sgr-llm-mock/bin
          cp tests/mock-llm/claude tests/mock-llm/codex /tmp/sgr-llm-mock/bin/
          chmod +x /tmp/sgr-llm-mock/bin/claude /tmp/sgr-llm-mock/bin/codex
          echo "/tmp/sgr-llm-mock/bin" >> $GITHUB_PATH
      - name: Run benchmarks
        env:
          RUST_TEST_THREADS: "2"
        run: timeout 900 cargo bench --bench regression_baseline -- --quick
      - name: Upload benchmark results
        uses: actions/upload-artifact@v6
        with:
          name: bench-baseline
          path: target/criterion

  careful:
    name: cargo-careful sanity
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-careful
      - name: Install mock LLM on PATH
        run: |
          mkdir -p /tmp/sgr-llm-mock/bin
          cp tests/mock-llm/claude tests/mock-llm/codex /tmp/sgr-llm-mock/bin/
          chmod +x /tmp/sgr-llm-mock/bin/claude /tmp/sgr-llm-mock/bin/codex
          echo "/tmp/sgr-llm-mock/bin" >> $GITHUB_PATH
      - run: timeout 1200 cargo +nightly careful test -- --test-threads=2

  changelog-version-check:
    name: CHANGELOG version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify CHANGELOG matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep -m 1 '^version = ' Cargo.toml | cut -d '"' -f 2)
          echo "Cargo.toml version: $CARGO_VERSION"
          if ! grep -q "^## \[$CARGO_VERSION\]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md missing entry [## ${CARGO_VERSION}]"
            echo "Did you forget to bump CHANGELOG.md before tagging?"
            exit 1
          fi
          if ! grep -q "^## \[$CARGO_VERSION\]" CHANGELOG.pt-BR.md; then
            echo "ERROR: CHANGELOG.pt-BR.md missing entry [## ${CARGO_VERSION}]"
            exit 1
          fi
          echo "OK: both CHANGELOGs have [$CARGO_VERSION] entry"

  coverage-threshold:
    name: Coverage threshold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-mold-linker
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install mock LLM on PATH
        run: |
          mkdir -p /tmp/sgr-llm-mock/bin
          cp tests/mock-llm/claude tests/mock-llm/codex /tmp/sgr-llm-mock/bin/
          chmod +x /tmp/sgr-llm-mock/bin/claude /tmp/sgr-llm-mock/bin/codex
          echo "/tmp/sgr-llm-mock/bin" >> $GITHUB_PATH
      - name: Generate coverage
        run: cargo llvm-cov --text --output-path coverage.txt
      - name: Enforce 75% threshold
        run: |
          TOTAL=$(tail -1 coverage.txt | awk '{print $NF}' | tr -d '%')
          echo "Total line coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 75" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below threshold 75%"
            exit 1
          fi
