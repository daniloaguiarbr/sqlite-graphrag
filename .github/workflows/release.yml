name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # v1.0.69: opt into Node.js 24 runtime ahead of the 2026-06-16 default
  # migration (see ci.yml for the full rationale).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate (cargo publish dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo publish --dry-run --allow-dirty

  build-matrix:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          # v1.0.53: dropped `x86_64-apple-darwin` because `ort-sys` (the ONNX
          # runtime backend used by `fastembed`) does not ship prebuilt binaries
          # for Intel macOS. Releases v1.0.37-v1.0.53 all failed on this job.
          # Intel Mac users should install via `cargo install sqlite-graphrag --locked`.
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-2025
            use-cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            use-cross: false
          # ARM64 Windows release builds require the native `windows-11-arm` runner.
          # v1.0.42 (HIGH 1): dropped `x86_64-unknown-linux-musl` because `ort` (the
          # ONNX runtime backend used by `fastembed`) does not ship a prebuilt for
          # the musl target on either rc.11 or rc.12. Five consecutive releases
          # (v1.0.37-v1.0.41) failed on this job, blocking the GitHub Releases
          # publish step. Alpine users should install via
          # `cargo install sqlite-graphrag --locked` or use a glibc-based
          # container (debian-slim, distroless/cc-debian12).
          # v1.0.42 (MEDIUM 1): added `x86_64-apple-darwin` for Intel Mac users.
          # macos-13 is the Intel runner; macos-latest is now Apple Silicon.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install explicit Rust target
        if: matrix.use-cross != true
        run: rustup target add ${{ matrix.target }}

      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      - name: Build with cross
        if: matrix.use-cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: matrix.use-cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin="sqlite-graphrag"
          pkg_name="sqlite-graphrag-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$pkg_name"
          cp "target/${{ matrix.target }}/release/$bin" "$pkg_name/"
          cp README.md CHANGELOG.md "$pkg_name/"
          tar czf "$pkg_name.tar.gz" "$pkg_name"
          shasum -a 256 "$pkg_name.tar.gz" > "$pkg_name.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bin="sqlite-graphrag.exe"
          pkg_name="sqlite-graphrag-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$pkg_name"
          cp "target/${{ matrix.target }}/release/$bin" "$pkg_name/"
          cp README.md CHANGELOG.md "$pkg_name/"
          7z a "$pkg_name.zip" "$pkg_name"
          certutil -hashfile "$pkg_name.zip" SHA256 > "$pkg_name.zip.sha256"

      - uses: actions/upload-artifact@v6
        with:
          name: sqlite-graphrag-${{ matrix.target }}
          path: |
            sqlite-graphrag-*.tar.gz
            sqlite-graphrag-*.tar.gz.sha256
            sqlite-graphrag-*.zip
            sqlite-graphrag-*.zip.sha256

  publish-github-release:
    name: Publish GitHub Release
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          ls -la

      - name: Compute consolidated SHA256SUMS
        run: |
          cd release
          rm -f SHA256SUMS.txt
          for f in *.tar.gz *.zip; do
            [ -e "$f" ] || continue
            shasum -a 256 "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Extract release notes for current version
        run: |
          # Extract only the section for the current tag from CHANGELOG.md.
          # Prevents GitHub 422 "body too long" when the full changelog exceeds 125 KB.
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, ver)) found=1 }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Fallback: if extraction produced nothing, use a minimal note
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${TAG}. See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > RELEASE_NOTES.md
          fi
          echo "--- Release notes ($(wc -c < RELEASE_NOTES.md) bytes) ---"
          head -30 RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            release/*

  publish-crates-io:
    name: crates.io publish is manual
    needs: publish-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-mold-linker
      - uses: Swatinem/rust-cache@v2.9.1
      - run: |
          echo "crates.io publication is intentionally manual for sqlite-graphrag"
          echo "run 'cargo login' once locally and then 'cargo publish' when you are ready"
